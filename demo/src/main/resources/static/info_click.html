<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info Page - Techno Valley</title>

  <!-- IconScout CDN -->
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v2.1.6/css/unicons.css">
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      fetch("https://your-api.com/user-info") // Replace with your real API
        .then(res => res.json())
        .then(data => {
          // User basic info
          document.getElementById("full-name").textContent = data.name;
          document.getElementById("user-id").textContent = `ID: ${data.id}`;
          document.getElementById("role").textContent = `Role: ${data.role}`;
          document.getElementById("email").textContent = `Email: ${data.email}`;
          document.getElementById("university").textContent = `University: ${data.university}`;
          document.getElementById("faculty").textContent = `Faculty: ${data.faculty}`;
  
          // User stats
          document.getElementById("post-count").textContent = data.stats.posts;
          document.getElementById("comment-count").textContent = data.stats.comments;
          document.getElementById("like-count").textContent = data.stats.likes;
        })
        .catch(err => {
          console.error("Error fetching user info:", err);
        });
    });
  </script>
  
  
  <!-- Internal Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

    :root {
      --primary-color-hue: 252;
      --dark-color-lightness: 17%;
      --light-color-lightness: 95%;
      --white-color-lightness: 100%;
      --color-white: hsl(252, 30%, var(--white-color-lightness));
      --color-light: hsl(252, 30%, var(--light-color-lightness));
      --color-grey: hsl(252, 15%, 65%);
      --color-primary: hsl(var(--primary-color-hue), 75%, 60%);
      --color-secondary: hsl(252, 100%, 90%);
      --color-success: hsl(120, 95%, 65%);
      --color-danger: hsl(0, 95%, 65%);
      --color-dark: hsl(252, 30%, var(--dark-color-lightness));
      --color-black: hsl(252, 30%, 10%);
      --border-radius: 2rem;
      --card-border-radius: 1rem;
      --btn-padding: 0.6rem 2rem;
      --search-padding: 0.6rem 1rem;
      --card-padding: 1rem;
      --sticky-top-left: 5.4rem;
      --sticky-top-right: -18rem;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      outline: 0;
      box-sizing: border-box;
      text-decoration: none;
      list-style: none;
      border: none;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--color-dark);
      background: var(--color-light);
      overflow-x: hidden;
    }

    .container {
      width: 80%;
      margin: 0 auto;
    }

    .btn {
      display: inline-block;
      padding: var(--btn-padding);
      font-weight: 500;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: all 300ms ease;
      font-size: 0.9rem;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .btn-primary {
      background: var(--color-primary);
      color: var(--color-white);
    }

    nav {
      width: 100%;
      background: var(--color-white);
      padding: 0.7rem 0;
      position: fixed;
      top: 0;
      z-index: 10;
    }

    nav .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    main {
      position: relative;
      top: 5.4rem;
    }

    main .container {
      display: grid;
      grid-template-columns: 18vw auto 20vw;
      column-gap: 2rem;
      position: relative;
    }

    main .container .left {
      height: max-content;
      position: sticky;
      top: var(--sticky-top-left);
    }

    main .container .right {
      height: max-content;
      position: sticky;
      top: var(--sticky-top-right);
      bottom: 0;
    }

    .feed .file {
      margin: 1rem 0;
      border-radius: var(--card-border-radius);
      overflow: hidden;
    }

    .feed .file a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .feed .file a:hover {
      text-decoration: underline;
    }

    @media screen and (max-width: 1200px) {
      .container {
        width: 96%;
      }

      main .container {
        grid-template-columns: 5rem auto 30vw;
        gap: 1rem;
      }

      .left {
        width: 5rem;
        z-index: 5;
      }

      main .container .left .profile {
        display: none;
      }

      .sidebar h3 {
        display: none;
      }

      .left .btn {
        display: none;
      }

      .customize-theme .card {
        width: 80vw;
      }
    }
    .info-card {
  background: var(--color-white);
  padding: 1.5rem;
  border-radius: var(--card-border-radius);
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  width: fit-content;
  max-width: 100%;
  margin: 2rem auto;
}

.info p {
  margin: 0.3rem 0;
  color: var(--color-grey);
}

    @media screen and (max-width: 992px) {
      nav .search-bar {
        display: none;
      }

      main .container {
        grid-template-columns: 0 auto 5rem;
        gap: 0;
      }

      main .container .left {
        grid-column: 3/4;
        position: fixed;
        bottom: 0;
        right: 0;
      }

      main .container .middle {
        grid-column: 1/3;
      }

      main .container .right {
        display: none;
      }

      .customize-theme .card {
        width: 80vw;
      }
    }
  </style>
</head>

<body>
  

  <main>
    <div class="container">
      <div class="left">
        <!-- Sidebar -->
      </div>

      <div class="middle">
        <div class="info-card">
          <div class="info">
            <h2 id="full-name">Loading...</h2>
            <p class="text-muted" id="user-id">ID: </p>
            <p class="text-muted" id="role">Role: </p>
            <p class="text-muted" id="email">Email: </p>
            <p class="text-muted" id="university">University: </p>
            <p class="text-muted" id="major">major: </p>
          
          
            <div class="user-activity">
        
              
                <div class="activity-posts">
                  <!-- Posts here -->
                </div>
              </div>
            </div>
      
            <div class="right">
              <div class="user-stats">
                <h4>Stats</h4>
                <ul>
                  <li><h5>Posts</h5><p id="post-count">0</p></li>
                 
                  <li><h5>Likes</h5><p id="like-count">0</p></li>
                </ul>
              </div>
          </div>
        </div>

        
      </div>
    </div>
  </main>

  <script src="./index.js"></script>
</body>
</html>
