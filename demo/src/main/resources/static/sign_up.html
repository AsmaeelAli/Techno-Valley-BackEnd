<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <style>
    /* نفس التنسيقات كما في الكود السابق دون تغيير */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
    }
    .container {
      background: rgba(35, 34, 34, 0.8);
      border-radius: 16px;
      padding: 40px 30px;
      width: 400px;
      max-width: 460px;
      box-shadow: 0 0 40px rgba(128, 0, 128, 0.4);
      backdrop-filter: blur(15px);
    }
    .sign_up_form {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2rem;
      font-weight: bold;
      background: linear-gradient(to right, #a64ac9, #6a00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }
    .input_box { margin-bottom: 18px; }
    .input_box label {
      display: block;
      margin-bottom: 6px;
      color: #ccc;
      font-size: 14px;
    }
    .input_box input,
    .input_box select {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #444;
      border-radius: 8px;
      background-color: #222;
      color: #fff;
      transition: border-color 0.3s ease;
    }
    .input_box input:focus,
    .input_box select:focus {
      outline: none;
      border-color: #a64ac9;
    }
    .sign_up_button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #8e2de2, #4a00e0);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .sign_up_button:hover {
      transform: scale(1.04);
      opacity: 0.95;
    }
    .sign_up {
      text-align: center;
      font-size: 14px;
      margin-top: 15px;
    }
    .sign_up a {
      color: #a64ac9;
      text-decoration: none;
      font-weight: 500;
    }
    .message {
      display: none;
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
    }
    .success { background-color: #00c853; color: white; }
    .error { background-color: #d32f2f; color: white; }
    @media (min-width: 768px) {
      .container { padding: 45px 35px; }
      .sign_up_form h3 { font-size: 2.2rem; }
      .input_box input { font-size: 17px; }
      .sign_up_button { font-size: 18px; }
      .sign_up { font-size: 15px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="signup_form" id="signupSection">
    <form onsubmit="handleSignup(event)">
      <h3 class="sign_up_form">Email Sign Up</h3>

      <div class="input_box">
        <label for="name">Full Name</label>
        <input id="name" name="name" placeholder="Your full name" required type="text"/>
      </div>

      <div class="input_box">
        <label for="university">Select University</label>
        <select id="university" required onchange="updateEmailPlaceholder()">
          <option value="">-- Choose your university --</option>
          <option value="mutah">mutah University</option>
          <option value="jadara">jadara University</option>
          <option value="hu">Hashemite University</option>
        </select>
      </div>

      <div class="input_box">
        <label for="email">Email Address</label>
        <input id="email" name="email" placeholder="example@University.edu.jo" required type="email"/>
      </div>

      <div class="input_box">
        <label for="password">Password</label>
        <input id="password" name="password" placeholder="Enter your password" required type="password"/>
      </div>

      <button class="sign_up_button" type="submit">Sign Up</button>
      <p class="sign_up">I have an account <a href="login.html">Login</a></p>
    </form>
  </div>
</div>

<div class="message error" id="errorMessage"></div>

<script>
  function showError(message) {
    const errorDiv = document.getElementById("errorMessage");
    errorDiv.textContent = message;
    errorDiv.style.display = "block";
    setTimeout(() => {
      errorDiv.style.display = "none";
    }, 3000);
  }

  function updateEmailPlaceholder() {
    const university = document.getElementById("university").value;
    const emailInput = document.getElementById("email");

    switch (university) {
      case "mutah":
        emailInput.placeholder = "example@mutah.edu.jo";
        break;
      case "jadara":
        emailInput.placeholder = "example@jadara.edu.jo or example@std.jadara.edu.jo";
        break;
      case "hu":
        emailInput.placeholder = "example@hu.edu.jo";
        break;
      default:
        emailInput.placeholder = "example@university.edu.jo";
    }
  }

  function handleSignup(event) {
    event.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const university = document.getElementById("university").value;

    let emailRegex;
    switch (university) {
      case "mutah":
        emailRegex = /^[a-zA-Z0-9._%+-]+@mutah\.edu\.jo$/;
        break;
      case "jadara":
        emailRegex = /^[a-zA-Z0-9._%+-]+@(jadara\.edu\.jo|std\.jadara\.edu\.jo)$/;
        break;
      case "hu":
        emailRegex = /^[a-zA-Z0-9._%+-]+@(hu\.edu\.jo|std\.hu\.edu\.jo)$/;
        break;
      default:
        showError("❌ Please select your university.");
        return;
    }

    if (!emailRegex.test(email)) {
      showError("❌ Invalid email format for selected university.");
      return;
    }

    fetch("/api/email/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        name: name,
        email: email,
        password: password,
      }),
    })
    .then(async (response) => {
      const contentType = response.headers.get("content-type");
      const responseBody = contentType && contentType.includes("application/json")
        ? await response.json()
        : await response.text();

      if (!response.ok) {
        throw new Error(responseBody.message || responseBody || "❌ Failed to send verification code.");
      }

      localStorage.setItem("signupEmail", email);
      localStorage.setItem("signupname", name);
      localStorage.setItem("signupPassword", password);

      window.location.href = "send code.html";
    })
    .catch((error) => {
      console.error("Actual error:", error);
      showError("❌" + error.message);
    });
  }
</script>
</body>
</html>
