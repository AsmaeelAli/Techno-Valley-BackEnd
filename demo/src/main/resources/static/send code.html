<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Code Verification</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #6a11cb, #cfd1d4e9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .background-ball {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff00cc, #3030ee);
            filter: blur(60px);
            pointer-events: none;
            mix-blend-mode: screen;
            z-index: 0;
            transition: transform 0.05s ease-out;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            width: 300px;
            z-index: 1;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            background-color: #fff;
            color: #333;
        }

        button {
            padding: 10px;
            width: 100%;
            background-color: #5a00cc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .resend {
            margin-top: 15px;
            font-size: 14px;
        }

        .message {
            margin-top: 10px;
            color: yellow;
        }

        /* Loading Screen with rotating dots */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.411);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .loading-screen .dots {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .loading-screen .dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background-color: #fff;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .loading-screen .dot:nth-child(1) {
            background-color: #f9f8fb;
            animation-delay: 0s;
        }

        .loading-screen .dot:nth-child(2) {
            background-color: #4349bb;
            animation-delay: 0.2s;
        }

        .loading-screen .dot:nth-child(3) {
            background-color: #feffff;
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.5);
            }
        }

    </style>
</head>
<body>

<div class="background-ball" id="colorBall"></div>

<div class="container">
    <h2>Enter Verification Code</h2>
    <input disabled id="emailInput" maxlength="100" placeholder="Your email" type="email"/>
    <input id="codeInput" maxlength="8" placeholder="Enter code here" type="text"/>
    <button onclick="verifyCode()">Verify Code</button>

    <div class="resend">
        <span id="timer">Resend available in 180s</span><br>
        <button disabled id="resendBtn" onclick="resendCode()">Resend Code</button>
    </div>

    <div class="message" id="messageArea"></div>
</div>

<!-- Loading Screen with bouncing dots -->
<div class="loading-screen" id="loadingScreen">
    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <p> Verifying Code...</p>
</div>

<script>
    let timeLeft = 180; // 3 دقائق
    let countdown; // نخزن الـ interval هنا

    const timerSpan = document.getElementById("timer");
    const resendBtn = document.getElementById("resendBtn");
    const messageArea = document.getElementById("messageArea");
    const loadingScreen = document.getElementById("loadingScreen");

    // تعيين الإيميل من localStorage
    const email = localStorage.getItem("signupEmail");
    document.getElementById("emailInput").value = email || "";

    function startCountdown() {
        countdown = setInterval(() => {
            timeLeft--;
            timerSpan.textContent = `Resend available in ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                resendBtn.disabled = false;
                timerSpan.textContent = "You can resend the code now.";
            }
        }, 1000);
    }

    startCountdown(); // أول مرة يبدأ المؤقت

    function verifyCode() {
        const enteredCode = document.getElementById("codeInput").value.trim();
        const email = document.getElementById("emailInput").value;

        if (!enteredCode || !email) {
            messageArea.style.color = "red";
            messageArea.textContent = "Please enter the code and make sure you're registered.";
            return;
        }

        showLoadingScreen();

        fetch("/api/email/verify", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                email: email,
                code: enteredCode,
            }),
        })
            .then((response) => response.json())
            .then((data) => {
                console.log("Response:", data);

                if (data.success) {
                    messageArea.style.color = "lightgreen";
                    messageArea.textContent = "✅ Code is correct! Redirecting...";
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    messageArea.style.color = "red";
                    messageArea.textContent = "❌ Incorrect code. Please try again.";
                }
            })
            .catch((error) => {
                console.error("Error verifying code:", error);
                messageArea.style.color = "red";
                messageArea.textContent = "❌ Something went wrong. Please try again.";
            });
    }

    function resendCode() {
        timeLeft = 180;
        resendBtn.disabled = true;
        messageArea.style.color = "yellow";
        messageArea.textContent = "🔁 A new code has been sent.";
        timerSpan.textContent = `Resend available in 180s`;

        clearInterval(countdown); // أوقف العد القديم
        startCountdown(); // وابدأ واحد جديد

        // إرسال طلب لإعادة إرسال الكود من الباكند
        fetch("", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                email: email
            })
        }).catch(err => {
            console.error("Error resending code:", err);
        });
    }

    function showLoadingScreen() {
        loadingScreen.style.display = "flex";
    }

    // الكرة الملونة الخلفية
    const ball = document.getElementById("colorBall");
    document.addEventListener("mousemove", (e) => {
        ball.style.transform = `translate(${e.clientX - 100}px, ${e.clientY - 100}px)`;
    });
</script>

</body>
</html>
