<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Code Verification</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .container {
            background: rgba(35, 34, 34, 0.919);
            border-radius: 12px;
            padding: 40px 35px;
            width: 400px;
            max-width: 600px;
            box-shadow: 0 0 40px rgba(128, 0, 128, 0.589);
            backdrop-filter: blur(10px);
            z-index: 1;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(to right, #a64ac9, #6a00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input_box {
            margin-bottom: 16px;
        }

        .input_box label {
            display: block;
            margin-bottom: 4px;
            color: #ccc;
            font-size: 14px;
        }

        .input_box input {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #222;
            color: #fff;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .input_box input:focus {
            outline: none;
            border-color: #8e2de2;
            background-color: #333;
        }

        button {
            padding: 14px;
            width: 100%;
            background: linear-gradient(to right, #8e2de2, #4a00e0);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }

        .resend {
            margin-top: 15px;
            font-size: 14px;
        }

        .message {
            margin-top: 10px;
            color: yellow;
        }

        .error-box {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            background-color: #ff4d4d;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-family: monospace;
            font-weight: bold;
        }

        .info-box {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            background-color: #ffc107;
            color: #000;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-family: 'Segoe UI', monospace;
            font-weight: bold;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.411);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .loading-screen .dots {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .loading-screen .dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background-color: #fff;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .loading-screen .dot:nth-child(1) {
            background-color: #f9f8fb;
            animation-delay: 0s;
        }

        .loading-screen .dot:nth-child(2) {
            background-color: #4349bb;
            animation-delay: 0.2s;
        }

        .loading-screen .dot:nth-child(3) {
            background-color: #feffff;
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Enter Verification Code</h2>
    <div class="input_box">
        <label for="emailInput">Your Email</label>
        <input disabled id="emailInput" maxlength="100" placeholder="Your email" type="email"/>
    </div>
    <div class="input_box">
        <label for="codeInput">Enter Code</label>
        <input id="codeInput" maxlength="8" placeholder="Enter code here" type="text"/>
    </div>
    <button onclick="verifyCode()">Verify Code</button>

    <div class="resend">
        <span id="timer">Resend available in 180s</span><br>
        <button disabled id="resendBtn" onclick="resendCode()">Resend Code</button>
    </div>

    <div class="message" id="messageArea"></div>
    <div class="error-box" id="errorBox"></div>
    <div class="info-box" id="infoBox"></div>
</div>

<!-- Loading screen -->
<div class="loading-screen" id="loadingScreen">
    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <p> Verifying Code...</p>
</div>

<script>
    let timeLeft = 5;
    let countdown;

    const timerSpan = document.getElementById("timer");
    const resendBtn = document.getElementById("resendBtn");
    const messageArea = document.getElementById("messageArea");
    const loadingScreen = document.getElementById("loadingScreen");
    const errorBox = document.getElementById("errorBox");
    const infoBox = document.getElementById("infoBox");

    const email = localStorage.getItem("signupEmail");
    document.getElementById("emailInput").value = email || "";

    function startCountdown() {
        countdown = setInterval(() => {
            timeLeft--;
            timerSpan.textContent = `Resend available in ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                resendBtn.disabled = false;
                timerSpan.textContent = "You can resend the code now.";
            }
        }, 1000);
    }

    startCountdown();

    function verifyCode() {
        const enteredCode = document.getElementById("codeInput").value.trim();

        if (!enteredCode || !email) {
            messageArea.style.color = "red";
            messageArea.textContent = "Please enter the code and make sure you're registered.";
            return;
        }

        showLoadingScreen();

        fetch("/api/email/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, code: enteredCode }),
        })
        .then(response => response.json())
        .then(data => {
            hideLoadingScreen();
            if (data.success) {
                messageArea.style.color = "lightgreen";
                messageArea.textContent = "✅ Code is correct! Redirecting...";
                setTimeout(() => window.location.href = "login.html", 2000);
            } else {
                messageArea.style.color = "red";
                messageArea.textContent = "❌ Incorrect code. Please try again.";
            }
        })
        .catch(error => {
            hideLoadingScreen();
            messageArea.style.color = "red";
            messageArea.textContent = "❌ Something went wrong.";
        });
    }

    function resendCode() {
        timeLeft = 5;
        resendBtn.disabled = true;
        timerSpan.textContent = `Resend available in ${timeLeft}s`;

        clearInterval(countdown);
        startCountdown();

        fetch("/api/email/resend", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email })
        })
        .then(async response => {
            const contentType = response.headers.get("content-type");
            const text = await response.text();

            if (!response.ok) throw new Error(contentType.includes("application/json") ? JSON.parse(text).message : text);

            showInfo("🔁 تم إرسال كود تأكيد.");
        })
        .catch(err => {
            showError(err.message);
        });
    }

    function showLoadingScreen() {
        loadingScreen.style.display = "flex";
    }

    function hideLoadingScreen() {
        loadingScreen.style.display = "none";
    }

    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = "block";
        errorBox.style.opacity = "1";

        setTimeout(() => {
            errorBox.style.opacity = "0";
            setTimeout(() => errorBox.style.display = "none", 500);
        }, 5000);
    }

    function showInfo(message) {
        infoBox.textContent = message;
        infoBox.style.display = "block";
        infoBox.style.opacity = "1";

        setTimeout(() => {
            infoBox.style.opacity = "0";
            setTimeout(() => infoBox.style.display = "none", 500);
        }, 5000);
    }
</script>

</body>
</html>
