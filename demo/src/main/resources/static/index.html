<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techno Valley</title>

    <!-- IconScout CDN -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v2.1.6/css/unicons.css">
    <link href="./sidebar.css" rel="stylesheet">
    <script src="sidebar.js"></script>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/jpg" href="images/WP_3.png">
</head>

<body>
    <!-- Navbar -->
    <nav>
        <div class="container navbar-flex">
            <!-- Logo -->
            <div class="logo">
                <img src="images/noBgColorcc.png" alt="Logo">
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <i class="uil uil-search"></i>
                <input id="searchInput" type="search" placeholder="Search">
                <div id="suggestionBox" class="suggestion-box"></div>
            </div>

            <!-- Placeholder for future upload or actions -->
            <div class="create">
                <label class="upload-button"></label>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="container">

 <!-- LEFT Sidebar -->
    <div class="left">
        <div class="sidebar">
            <div class="sidebar-section">
                <a class="menu-item" href="index.html">
                    <span><i class="uil uil-home"></i></span>
                    <h3>Home</h3>
                </a>
                <a class="menu-item" href="Explore.html">
                    <span><i class="uil uil-compass"></i></span>
                    <h3>Explore</h3>
                </a>
                <a class="menu-item" href="courses.html">
                    <span><i class="uil uil-book-open"></i></span>
                    <h3>Courses</h3>
                </a>
                <a class="menu-item" href="info.html">
                    <span><i class="uil uil-user"></i></span>
                    <h3>My Profile</h3>
                </a>
                <a class="menu-item" href="support.html">
                    <span><i class="uil uil-question-circle"></i></span>
                    <h3>Help & Support</h3>
                </a>
            </div>
        </div>
        <button class="btn-logout" onclick="handleLogout()">
            <i class="uil uil-signout"></i>
            <span>Logout</span>
        </button>
    </div>

            <!-- Middle Section -->
            <div class="middle">

                <!-- Create Post -->
                <form class="create-post">
                    <textarea id="postInput" class="custom-textarea" placeholder="What's on your mind?"></textarea>
                    <input type="button" value="Post" class="btn btn-primary" id="postButton">
                </form>

                <!-- File Upload -->
                <input type="file" id="fileUpload" accept=".pdf, .txt" style="display: none;">
                <label for="fileUpload" class="btn btn-primary">Upload File</label>

                <!-- Image Upload -->
                <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                <label for="imageUpload" class="btn btn-primary">Upload Image</label>

                <!-- Posts Feed -->
                <div id="postsContainer" class="feeds">
                    <!-- المنشورات ستظهر هنا -->
                </div>

            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="./jwtHelper.js"></script>
    <script type="module" src="./index.js"></script>
    <script>
  function handleLogout() {
    // حذف بيانات الجلسة
    sessionStorage.clear();
    localStorage.clear(); // في حال كنت تستخدم localStorage أيضًا

    // إعادة توجيه المستخدم إلى صفحة تسجيل الدخول
    window.location.href = "login.html";
  }
</script>
</body>
</html>
