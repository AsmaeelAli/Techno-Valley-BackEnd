<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Techno-Valley</title>
    <!-- IconScout CDN -->
    <link href="https://unicons.iconscout.com/release/v2.1.6/css/unicons.css" rel="stylesheet">
    <!-- Stylesheet -->
    <link href="./style.css" rel="stylesheet">
    <link href="WP_3.png" rel="icon" type="image/jpg">
</head>
<body>
<nav>
    <div class="container nav-container">
        <img class="logo" src="noBgColorcc.png">

        <!-- Search Bar -->
        <div class="search-bar">
            <input placeholder="Search Techno-Valley..." type="text"/>
            <button type="submit"><i class="uil uil-search"></i></button>
        </div>
    </div>
</nav>

<!-------------------------------- MAIN ----------------------------------->
<main>
    <div class="container">
        <!----------------- LEFT -------------------->
        <div class="left">


            <!----------------- SIDEBAR -------------------->
            <div class="sidebar">
                <!-- General Section -->
                <div class="sidebar-section">

                    <a class="menu-item active" href="index.html">
                        <span><i class="uil uil-home"></i></span>
                        <h3>Home</h3>
                    </a>
                    <a class="menu-item" href="Explore.html">
                        <span><i class="uil uil-compass"></i></span>
                        <h3>Explore</h3>
                    </a>

                    <a class="menu-item" href="#">
                        <span><i class="uil uil-book-open"></i></span>
                        <h3>Courses</h3>
                    </a>

                    <a class="menu-item" href="#">
                        <span><i class="uil uil-file-alt"></i></span>
                        <h3>Resources</h3>
                    </a>
                    <a class="menu-item" href="info.html">
                        <span><i class="uil uil-user"></i></span>
                        <h3>My Profile</h3>
                    </a>

                    <a class="menu-item" href="#">
                        <span><i class="uil uil-question-circle"></i></span>
                        <h3>Help & Support</h3>
                    </a>
                </div>

                <!-- Academic Section -->
                <div class="sidebar-section">


                </div>

                <!-- Settings Section -->
                <div class="sidebar-section">


                </div>
            </div>
            <!----------------- END OF SIDEBAR -------------444444------>


        </div>

        <!----------------- MIDDLE (Main Content) -------------------->
        <div class="middle">


            <h2 class="form-title">Create Post</h2>
            <form id="createPostForm" name="create-post" onsubmit="return handleSubmit(event)">
                <textarea
                        class="post-input"
                        name="postContent"
                        placeholder="What's on your mind?"
                        required
                ></textarea>

                <div class="buttons-container">
                    <button class="post-button" type="submit">Post</button>
                    <input
                            accept=".pdf,.jpg,.png"
                            id="fileInput"
                            multiple
                            name="files"
                            onchange="handleFileSelect(event)"
                            type="file"
                    >
                    <button
                            class="upload-button"
                            onclick="document.getElementById('fileInput').click()"
                            type="button"
                    >
                        Upload File
                    </button>
                </div>
                <div class="file-info" id="fileInfo"></div>
                <div class="error-message" id="errorMessage"></div>
            </form>


            <!-- Recent Posts -->
            <div class="feeds">
                <!-- المنشورات ستظهر هنا -->
            </div>

        </div>

        <!----------------- RIGHT (Additional Content) -------------------->

</main>
</main>

<!----------------- THEME CUSTOMIZATION -------------------->

</div>


<script src="./index.js"></script>
</body>
</html>
