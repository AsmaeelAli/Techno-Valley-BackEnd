<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
    }

    .container {
      background: rgba(35, 34, 34, 0.919);
      border-radius: 12px;
      padding: 40px 35px;
      width: 400px;
      max-width: 600px;
      box-shadow: 0 0 40px rgba(128, 0, 128, 0.589);
      backdrop-filter: blur(10px);
    }

    .login_form h3 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 2rem;
      font-weight: bold;
      background: linear-gradient(to right, #a64ac9, #6a00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input_box {
      margin-bottom: 18px;
    }

    .input_box label {
      display: block;
      margin-bottom: 6px;
      color: #ccc;
      font-size: 14px;
    }

    .input_box input {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      border: 1px solid #444;
      border-radius: 6px;
      background-color: #222;
      color: #fff;
      transition: border-color 0.3s;
    }

    .input_box input:focus {
      outline: none;
      border-color: #a64ac9;
    }

    .password_title {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .password_title a {
      font-size: 12px;
      text-decoration: none;
      color: #a64ac9;
    }

    .login_button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #8e2de2, #4a00e0);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
    }

    .login_button:hover {
      opacity: 0.95;
    }

    .sign_up {
      text-align: center;
      font-size: 14px;
      margin-top: 15px;
    }

    .sign_up a {
      color: #a64ac9;
      text-decoration: none;
      font-weight: 500;
    }

    .message {
      margin-top: 18px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      font-size: 15px;
      display: none;
    }

    .message.success {
      background-color: #00c853;
      color: #fff;
    }

    .message.error {
      background-color: #d32f2f;
      color: #fff;
    }

    @media (min-width: 768px) {
      .container {
        padding: 40px 30px;
      }

      .login_form h3 {
        font-size: 2.2rem;
      }

      .input_box input {
        font-size: 16px;
      }

      .login_button {
        font-size: 17px;
      }

      .sign_up {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="login_form" id="loginSection">
    <form onsubmit="handleSubmit(event)">
      <h3>Login</h3>

      <div class="input_box">
        <label for="email">Email</label>
        <input id="email" placeholder="example@University.edu.jo" required type="email"/>
      </div>

      <div class="input_box">
        <div class="password_title">
          <label for="password">Password</label>
          <a href="#">Forgot Password?</a>
        </div>
        <input id="password" placeholder="Enter your password" required type="password"/>
      </div>

      <button class="login_button" type="submit">Log In</button>
      <p class="sign_up">Don't have an account? <a href="sign_up.html">Sign up</a></p>
    </form>

    <div class="message" id="messageBox"></div>
  </div>
</div>

<script src="jwtHelper.js"></script>

<script>
  function handleSubmit(event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    // Simple validation
    if (!email || !password) {
      showMessage("Please enter both email and password.", "error");
      return;
    }

    fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    })
    .then(async response => {
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || "Login failed.");
      }

      if (data?.token) {
        JWT.saveToken(data.token);
      } else {
        throw new Error("Token not received from server.");
      }

      showMessage(data.message || "Login successful.", "success");

      // Redirect after success
      setTimeout(() => {
        window.location.href = "info.html";
      }, 1500);
    })
    .catch(error => {
      showMessage(error.message, "error");
    });
  }

  function showMessage(text, type) {
    const box = document.getElementById("messageBox");
    box.textContent = text;
    box.className = `message ${type}`;
    box.style.display = "block";

    setTimeout(() => {
      box.style.display = "none";
    }, 3000);
  }
</script>

</body>
</html>
