<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: url('https://cdn-icons-png.flaticon.com/512/25/25694.png'), auto;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #000000, #111111);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            position: relative;
            z-index: 1;
        }

        .login_form h3 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 40px;
            font-weight: bold;
            color: #fff;
        }

        .input_box {
            margin-bottom: 20px;
        }

        .input_box label {
            display: block;
            margin-bottom: 6px;
            color: #ccc;
        }

        .input_box input {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #f0f0f0, #ccc);
            border: none;
            border-radius: 8px;
            color: #000;
        }

        .password_title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .password_title a {
            font-size: 12px;
            text-decoration: none;
            color: #66aaff;
        }

        .login_button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #8e2de2, #4a00e0);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login_button:hover {
            transform: scale(1.05);
        }

        .sign_up {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }

        .sign_up a {
            color: #66aaff;
            text-decoration: none;
        }

        .message {
            display: none;
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            background-color: #00c853;
            color: white;
        }

        .error {
            background-color: #d32f2f;
            color: white;
        }


        .firework {
            position: absolute;
            width: 10px; /* تم تكبير النقطة */
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 1;
            filter: blur(1px); /* يعطي أثر ناعم */
            box-shadow: 0 0 10px currentColor; /* يظهر أثر للمسار */
            animation: fireworkMove 1s ease-out forwards;
            transform: translate(var(--x), var(--y));
        }

        @keyframes fireworkMove {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: scale(1.2) translate(var(--x), var(--y));
                opacity: 0;
            }
        }
    </style>
</head>
<body onclick="createFirework(event)">

<div class="container">
    <div class="login_form" id="loginSection">
        <form onsubmit="handleSubmit(event)">
            <h3>Login</h3>

            <div class="input_box">
                <label for="email">Email</label>
                <input id="email" placeholder="example@mutah.edu.jo" required type="email"/>
            </div>

            <div class="input_box">
                <div class="password_title">
                    <label for="password">Password</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <input id="password" placeholder="Enter your password" required type="password"/>
            </div>

            <button class="login_button" type="submit">Log In</button>
            <p class="sign_up">Don't have an account? <a href="sign_up.html">Sign up</a></p>
        </form>

        <div class="message" id="messageBox"></div>
    </div>
</div>

<script>
    function handleSubmit(event) {
        event.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        fetch("http://localhost:8080/api/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, password})
        })
            .then(async response => {
                const text = await response.text();
                console.log("Raw response:", text); // 🔍 هذا يكشف الخطأ
                const data = JSON.parse(text);
                if (!response.ok) throw new Error(data.message);
                return data;
            })
            .then(data => {
                showMessage(data.message, "success");
                setTimeout(() => window.location.href = "index.html", 1500);
            })
            .catch(error => {
                showMessage(error.message, "error");
            });
    }

    function showMessage(text, type) {
        const box = document.getElementById("messageBox");
        box.textContent = text;
        box.className = `message ${type}`;
        box.style.display = "block";
        setTimeout(() => {
            box.style.display = "none";
        }, 3000);
    }

    function createFirework(e) {
        const numberOfParticles = 50;

        for (let i = 0; i < numberOfParticles; i++) {
            const particle = document.createElement('div');
            particle.classList.add('firework');
            particle.style.background = getRandomColor();
            particle.style.left = `${e.clientX - 4}px`;
            particle.style.top = `${e.clientY - 4}px`;

            const angle = Math.random() * 2 * Math.PI;
            const distance = Math.random() * 120 + 60; // مسار أطول
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;

            particle.style.setProperty('--x', `${x}px`);
            particle.style.setProperty('--y', `${y}px`);

            const duration = Math.random() * 0.5 + 1.5; // 1.5 إلى 2 ثانية
            particle.style.animation = `fireworkMove ${duration}s ease-out forwards`;

            document.body.appendChild(particle);

            setTimeout(() => particle.remove(), (duration + 0.5) * 1000); // وقت كافٍ للإزالة
        }
    }

    function getRandomColor() {
        const colors = ['#ff00cc', '#ff99ff', '#ffffff', '#4a00e0'];
        return colors[Math.floor(Math.random() * colors.length)];
    }
</script>
</body>
</html>
